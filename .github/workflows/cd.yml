name: CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Vercel deploys are opt-in. To enable preview/production deploys, set the repository
# variable ENABLE_VERCEL_CD=true and add the VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID
# secrets. Until then this workflow is a no-op (keeps a fresh template free of failed deploys).
jobs:
  preview:
    if: vars.ENABLE_VERCEL_CD == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy preview
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      - name: Comment PR with preview URL
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: ${process.env.PREVIEW_URL}`
            })
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}

  production:
    if: vars.ENABLE_VERCEL_CD == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Run gate
        run: npm run gate:full

      - name: Build
        run: npm run build

      - name: Deploy production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Verify deploy
        run: npm run verify:deploy
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL }}
