name: Docs CI

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".discipline/**"
      - "discipline.md"
      - "task_plan.md"
      - "findings.md"
      - "progress.md"
      - "tools/discipline/**"
      - ".github/workflows/docs.yml"
      - ".markdownlint-cli2.jsonc"
      - ".vale.ini"
      - ".vale/**"

permissions:
  contents: read
  checks: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Discipline Loop validate
        run: npm run discipline:validate

      - name: Markdown lint
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --name-only -z "$BASE_SHA" "$HEAD_SHA" -- '*.md' |
            xargs -0 -r npx markdownlint-cli2 --no-globs

      - name: Vale lint
        uses: errata-ai/vale-action@v2
        with:
          reporter: github-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
